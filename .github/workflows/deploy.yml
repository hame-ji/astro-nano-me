name: Deploy Pages

on:
  workflow_run:
    workflows: ["Main Build"]
    types:
      - completed

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download build artifact from Main Build
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: ./dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Upload Pages artifact for deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke test deployed routes
        env:
          ROOT_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail

          routes=(
            "/"
            "/en/"
            "/fr/"
            "/en/projects/"
            "/fr/projects/"
            "/en/work/"
            "/fr/work/"
            "/en/blog/"
            "/fr/blog/"
          )

          for route in "${routes[@]}"; do
            curl --fail --show-error --silent \
              --retry 5 --retry-delay 6 --retry-all-errors \
              -H "User-Agent: astro-nano-smoke-test" \
              "${ROOT_URL%/}${route}"
          done
