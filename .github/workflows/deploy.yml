name: Deploy Pages

on:
  workflow_run:
    workflows: ["Main Build"]
    types:
      - completed

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download build artifact from Main Build
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: ./dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Upload Pages artifact for deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke test deployed routes
        env:
          BASE_URL: ${{ steps.deployment.outputs.page_url }}
          ROUTES_FILE: dist/smoke-routes.txt
          USER_AGENT: astro-nano-smoke-test
          ASSERT_LOCALES: en fr
        run: |
          ./scripts/probe-routes.sh
